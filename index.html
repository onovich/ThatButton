<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>核心熔毁：那个键 | 2026 GameJam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --crt-green: #4af626;
            --crt-red: #ff2a2a;
            --crt-yellow: #ffcc00;
            --panel-bg: #1a1a1a;
        }
        
        html {
            min-height: 100%;
            background-color: var(--bg-color);
        }

        body {
            background-color: var(--bg-color);
            color: var(--crt-green);
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overscroll-behavior: none;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .crt-font { font-family: 'Share Tech Mono', monospace; }

        /* CRT Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.6;
        }

        /* Screen Glitch & Shake */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        @keyframes micro-shake {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0px, 0px); }
        }

        .shake-intense { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; color: var(--crt-red) !important; }
        .shake-light { animation: micro-shake 0.1s both; }

        /* Game UI Components */
        #game-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            position: relative;
            z-index: 10;
        }

        .top-status {
            gap: 0.5rem;
            min-height: 32px;
        }

        .status-value {
            display: inline-block;
            min-width: 2ch;
            text-align: right;
        }

        .best-status {
            min-height: 24px;
            border: 1px solid rgba(74, 246, 38, 0.35);
            background: rgba(0, 20, 0, 0.45);
            border-radius: 3px;
            padding: 0.25rem 0.5rem;
            margin-bottom: 0.5rem;
            color: var(--crt-green);
            box-shadow: inset 0 0 10px rgba(74, 246, 38, 0.1);
            letter-spacing: 0;
        }

        .best-status-note {
            color: var(--crt-yellow);
        }

        .terminal-box {
            background-color: rgba(0, 20, 0, 0.8);
            border: 2px solid var(--crt-green);
            box-shadow: 0 0 10px rgba(74, 246, 38, 0.3), inset 0 0 15px rgba(74, 246, 38, 0.2);
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1rem;
            min-height: 112px;
            position: relative;
        }

        #clue-text {
            min-height: 3.5rem;
        }

        .terminal-hint {
            letter-spacing: 0;
        }

        /* Buttons Styling */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            perspective: 1000px;
            contain: layout;
            width: 100%;
            max-width: var(--board-max-width, 500px);
            margin: 0 auto;
        }

        .game-btn {
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.8), 0 15px 20px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.4);
            transition: all 0.1s ease;
            position: relative;
            border: 2px solid rgba(0,0,0,0.5);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            outline-offset: 4px;
        }

        .game-btn:focus-visible {
            outline: 2px solid #fff;
        }

        .btn-number {
            font-size: 0.875rem;
            line-height: 1;
            margin-bottom: 0.25rem;
            opacity: 0.8;
        }

        .btn-shape {
            font-size: 2.5rem;
            line-height: 1;
        }

        .game-btn:active, .game-btn.pressed {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.8), 0 2px 5px rgba(0,0,0,0.5), inset 0 4px 6px rgba(0,0,0,0.6);
        }

        .game-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(0.8);
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.8);
        }
        
        .game-btn.explode {
            background-color: var(--crt-red) !important;
            box-shadow: 0 0 30px var(--crt-red) !important;
            border-color: #fff;
            transform: scale(1.1) translateY(0);
            z-index: 20;
        }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 12px;
            background-color: #111;
            border: 1px solid var(--crt-green);
            margin-bottom: 1rem;
            border-radius: 2px;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: var(--crt-green);
            box-shadow: 0 0 10px var(--crt-green);
            transform-origin: left;
            transition: background-color 0.3s;
        }
        
        .timer-danger { background-color: var(--crt-red) !important; box-shadow: 0 0 10px var(--crt-red) !important; }

        /* Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; padding: 2rem;
            backdrop-filter: blur(4px);
            box-sizing: border-box;
            overflow-y: auto;
        }
        .hidden { display: none !important; }

        .btn-ui {
            background: transparent;
            color: var(--crt-green);
            border: 2px solid var(--crt-green);
            padding: 10px 30px;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(74, 246, 38, 0.2);
            transition: all 0.2s;
            min-height: 44px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-ui:hover {
            background: var(--crt-green);
            color: #000;
            box-shadow: 0 0 20px rgba(74, 246, 38, 0.6);
        }
        
        .btn-ui-red {
            color: var(--crt-red); border-color: var(--crt-red); box-shadow: 0 0 10px rgba(255, 42, 42, 0.2);
        }
        .btn-ui-red:hover {
            background: var(--crt-red); color: #fff; box-shadow: 0 0 20px rgba(255, 42, 42, 0.6);
        }

        .failure-recap {
            width: 100%;
            max-width: 360px;
            margin-bottom: 1rem;
            border: 1px solid rgba(74, 246, 38, 0.35);
            border-radius: 4px;
            background: rgba(0, 20, 0, 0.55);
            padding: 0.75rem;
            text-align: left;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .failure-recap-title {
            color: var(--crt-yellow);
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .failure-result {
            color: var(--crt-green);
            border-bottom: 1px solid rgba(74, 246, 38, 0.25);
            padding-bottom: 0.35rem;
            margin-bottom: 0.35rem;
            font-weight: 700;
        }

        .failure-recap-row {
            margin-top: 0.25rem;
        }

        .failure-recap-list {
            margin: 0.25rem 0 0;
            padding-left: 1rem;
        }

        /* Utility Color Classes for Buttons */
        .color-red { background: linear-gradient(145deg, #ff4d4d, #cc0000); color: #fff; }
        .color-blue { background: linear-gradient(145deg, #4da6ff, #0066cc); color: #fff; }
        .color-yellow { background: linear-gradient(145deg, #ffd633, #cca300); color: #000; }
        .color-purple { background: linear-gradient(145deg, #b366ff, #7300e6); color: #fff; }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        @media (max-width: 520px) {
            #game-container {
                max-width: none;
                justify-content: flex-start;
                padding: max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(0.75rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
            }

            .top-status {
                align-items: center;
                margin-bottom: 0.4rem;
                font-size: 0.95rem;
            }

            .status-value {
                font-size: 1.1rem;
            }

            .best-status {
                font-size: 0.75rem;
                margin-bottom: 0.4rem;
            }

            #warning-text {
                font-size: 0.75rem;
            }

            .timer-container {
                height: 10px;
                margin-bottom: 0.65rem;
            }

            .terminal-box {
                min-height: 104px;
                margin-bottom: 0.75rem;
                padding: 0.75rem;
            }

            #clue-text {
                min-height: 3.25rem;
                font-size: 1rem;
                line-height: 1.45;
            }

            .btn-grid {
                gap: 9px;
            }

            .game-btn {
                border-radius: 7px;
                box-shadow: 0 6px 0 rgba(0,0,0,0.8), 0 10px 16px rgba(0,0,0,0.45), inset 0 2px 2px rgba(255,255,255,0.4);
            }

            .game-btn:active,
            .game-btn.pressed,
            .game-btn.disabled {
                transform: translateY(6px);
            }

            .game-btn.explode {
                transform: scale(1.08) translateY(0);
            }

            .btn-shape {
                font-size: 2.25rem;
            }

            .overlay {
                align-items: stretch;
                padding: max(1.25rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            }

            .start-title {
                font-size: 2.25rem;
                line-height: 1.1;
            }

            .start-subtitle {
                margin-bottom: 1rem;
            }

            .start-rules {
                max-height: 46dvh;
                overflow-y: auto;
                margin-bottom: 0.75rem;
            }

            .btn-ui {
                width: 100%;
                margin-top: 0.75rem;
            }

            .failure-title {
                font-size: 2.75rem;
                margin-bottom: 0.75rem;
            }

            .failure-recap {
                max-height: 42dvh;
                overflow-y: auto;
                font-size: 0.78rem;
                padding: 0.65rem;
                margin-bottom: 0.65rem;
            }
        }

        @media (max-width: 360px) {
            .top-status {
                font-size: 0.8rem;
            }

            .status-value {
                font-size: 1rem;
            }

            .best-status {
                font-size: 0.7rem;
                padding: 0.2rem 0.4rem;
            }

            #clue-text {
                font-size: 0.95rem;
            }

            .btn-number {
                font-size: 0.75rem;
            }

            .btn-shape {
                font-size: 2rem;
            }
        }

        @media (max-height: 700px) {
            #game-container {
                justify-content: flex-start;
            }

            .terminal-box {
                min-height: 94px;
                padding-top: 0.65rem;
                padding-bottom: 0.65rem;
            }

            #clue-text {
                min-height: 3rem;
            }

            .start-rules {
                max-height: 40dvh;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div id="game-container">
        
        <!-- Header -->
        <div class="top-status flex justify-between items-end mb-2 crt-font">
            <div class="text-xl">SYS.LEVEL: <span id="level-display" class="status-value text-2xl font-bold">1</span></div>
            <div class="text-sm blink text-red-500 hidden" id="warning-text">CRITICAL OVR</div>
            <div class="text-xl">SCORE: <span id="score-display" class="status-value">0</span></div>
        </div>

        <div id="best-status" class="best-status crt-font text-xs flex justify-between items-center" aria-live="polite">
            <span>BEST: <span id="best-level-display">--</span> / <span id="best-score-display">0</span></span>
            <span id="best-status-note" class="best-status-note"></span>
        </div>

        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>

        <!-- Terminal Clue Display -->
        <div class="terminal-box">
            <div class="text-xs mb-1 opacity-70 crt-font border-b border-green-800 pb-1">>> FATAL_CONDITION // READ FIRST</div>
            <div id="clue-text" class="text-lg font-bold tracking-wider leading-relaxed mt-2">
                <!-- Typewriter text goes here -->
            </div>
            <div class="terminal-hint text-xs mt-2 text-yellow-400 crt-font">** 避开禁止按键，清空所有安全键 **</div>
        </div>

        <!-- Button Grid -->
        <div id="btn-grid" class="btn-grid">
            <!-- Buttons generated by JS -->
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-screen" class="overlay">
            <h1 class="start-title text-5xl font-black mb-2 tracking-widest crt-font text-center" style="text-shadow: 0 0 20px var(--crt-green);">别按那个键</h1>
            <p class="start-subtitle text-xl mb-8 opacity-80 font-bold tracking-widest">CORE MELTDOWN</p>
            <div class="start-rules text-left max-w-sm text-sm leading-relaxed mb-8 opacity-90 p-4 border border-green-800 rounded bg-black bg-opacity-50">
                <p class="text-yellow-400 mb-2 font-bold">> 操作员指令：</p>
                <p class="mb-1">1. 每轮终端都会发布<span class="text-red-500 font-bold">【致命条件】</span>。</p>
                <p class="mb-1">2. 符合条件的按钮都是<span class="text-red-500 font-bold">禁止按键</span>，可能不止一个。</p>
                <p class="mb-1">3. 不符合条件的按钮才是<span class="text-green-400 font-bold">安全键</span>。</p>
                <p class="mb-1 text-green-400">4. 按下全部安全键，清空面板。</p>
                <p class="mt-2 text-xs opacity-70 text-center">读规则，避开致命键。系统会逐级加压。</p>
            </div>
            <button class="btn-ui" onclick="startGame()">开始清空面板</button>
        </div>

        <!-- Game Over Screen Overlay -->
        <div id="game-over-screen" class="overlay hidden">
            <h1 class="failure-title text-6xl font-black mb-4 text-red-500 crt-font blink">SYSTEM FAILURE</h1>
            <p class="text-2xl mb-2 text-white">核心已熔毁</p>
            <p class="text-lg mb-8 text-yellow-400">最终存活轮数: <span id="final-level" class="font-bold text-2xl">0</span></p>
            <p id="death-reason" class="text-sm opacity-80 mb-4 max-w-xs text-center leading-relaxed">
                已触发禁止按键。
            </p>
            <div id="failure-recap" class="failure-recap text-xs crt-font"></div>
            <button class="btn-ui btn-ui-red" onclick="resetGame()">重新进入面板</button>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
