<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>核心熔毁：那个键 | 2026 GameJam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --crt-green: #4af626;
            --crt-red: #ff2a2a;
            --crt-yellow: #ffcc00;
            --panel-bg: #1a1a1a;
        }
        
        html {
            min-height: 100%;
            background-color: var(--bg-color);
        }

        body {
            background-color: var(--bg-color);
            color: var(--crt-green);
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            overscroll-behavior: none;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .crt-font { font-family: 'Share Tech Mono', monospace; }

        /* CRT Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.6;
        }

        /* Screen Glitch & Shake */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        @keyframes micro-shake {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0px, 0px); }
        }

        .shake-intense { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; color: var(--crt-red) !important; }
        .shake-light { animation: micro-shake 0.1s both; }

        /* Game UI Components */
        #game-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            position: relative;
            z-index: 10;
        }

        .top-status {
            gap: 0.5rem;
            min-height: 32px;
        }

        .status-value {
            display: inline-block;
            min-width: 2ch;
            text-align: right;
        }

        .terminal-box {
            background-color: rgba(0, 20, 0, 0.8);
            border: 2px solid var(--crt-green);
            box-shadow: 0 0 10px rgba(74, 246, 38, 0.3), inset 0 0 15px rgba(74, 246, 38, 0.2);
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1rem;
            min-height: 112px;
            position: relative;
        }

        #clue-text {
            min-height: 3.5rem;
        }

        .terminal-hint {
            letter-spacing: 0;
        }

        /* Buttons Styling */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            perspective: 1000px;
            contain: layout;
            width: 100%;
            max-width: var(--board-max-width, 500px);
            margin: 0 auto;
        }

        .game-btn {
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.8), 0 15px 20px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.4);
            transition: all 0.1s ease;
            position: relative;
            border: 2px solid rgba(0,0,0,0.5);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            outline-offset: 4px;
        }

        .game-btn:focus-visible {
            outline: 2px solid #fff;
        }

        .btn-number {
            font-size: 0.875rem;
            line-height: 1;
            margin-bottom: 0.25rem;
            opacity: 0.8;
        }

        .btn-shape {
            font-size: 2.5rem;
            line-height: 1;
        }

        .game-btn:active, .game-btn.pressed {
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.8), 0 2px 5px rgba(0,0,0,0.5), inset 0 4px 6px rgba(0,0,0,0.6);
        }

        .game-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(0.8);
            transform: translateY(8px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.8);
        }
        
        .game-btn.explode {
            background-color: var(--crt-red) !important;
            box-shadow: 0 0 30px var(--crt-red) !important;
            border-color: #fff;
            transform: scale(1.1) translateY(0);
            z-index: 20;
        }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 12px;
            background-color: #111;
            border: 1px solid var(--crt-green);
            margin-bottom: 1rem;
            border-radius: 2px;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background-color: var(--crt-green);
            box-shadow: 0 0 10px var(--crt-green);
            transform-origin: left;
            transition: background-color 0.3s;
        }
        
        .timer-danger { background-color: var(--crt-red) !important; box-shadow: 0 0 10px var(--crt-red) !important; }

        /* Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; padding: 2rem;
            backdrop-filter: blur(4px);
            box-sizing: border-box;
            overflow-y: auto;
        }
        .hidden { display: none !important; }

        .btn-ui {
            background: transparent;
            color: var(--crt-green);
            border: 2px solid var(--crt-green);
            padding: 10px 30px;
            font-size: 1.2rem;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(74, 246, 38, 0.2);
            transition: all 0.2s;
            min-height: 44px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-ui:hover {
            background: var(--crt-green);
            color: #000;
            box-shadow: 0 0 20px rgba(74, 246, 38, 0.6);
        }
        
        .btn-ui-red {
            color: var(--crt-red); border-color: var(--crt-red); box-shadow: 0 0 10px rgba(255, 42, 42, 0.2);
        }
        .btn-ui-red:hover {
            background: var(--crt-red); color: #fff; box-shadow: 0 0 20px rgba(255, 42, 42, 0.6);
        }

        /* Utility Color Classes for Buttons */
        .color-red { background: linear-gradient(145deg, #ff4d4d, #cc0000); color: #fff; }
        .color-blue { background: linear-gradient(145deg, #4da6ff, #0066cc); color: #fff; }
        .color-yellow { background: linear-gradient(145deg, #ffd633, #cca300); color: #000; }
        .color-purple { background: linear-gradient(145deg, #b366ff, #7300e6); color: #fff; }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        @media (max-width: 520px) {
            #game-container {
                max-width: none;
                justify-content: flex-start;
                padding: max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right)) max(0.75rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
            }

            .top-status {
                align-items: center;
                margin-bottom: 0.4rem;
                font-size: 0.95rem;
            }

            .status-value {
                font-size: 1.1rem;
            }

            #warning-text {
                font-size: 0.75rem;
            }

            .timer-container {
                height: 10px;
                margin-bottom: 0.65rem;
            }

            .terminal-box {
                min-height: 104px;
                margin-bottom: 0.75rem;
                padding: 0.75rem;
            }

            #clue-text {
                min-height: 3.25rem;
                font-size: 1rem;
                line-height: 1.45;
            }

            .btn-grid {
                gap: 9px;
            }

            .game-btn {
                border-radius: 7px;
                box-shadow: 0 6px 0 rgba(0,0,0,0.8), 0 10px 16px rgba(0,0,0,0.45), inset 0 2px 2px rgba(255,255,255,0.4);
            }

            .game-btn:active,
            .game-btn.pressed,
            .game-btn.disabled {
                transform: translateY(6px);
            }

            .game-btn.explode {
                transform: scale(1.08) translateY(0);
            }

            .btn-shape {
                font-size: 2.25rem;
            }

            .overlay {
                align-items: stretch;
                padding: max(1.25rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1.25rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
            }

            .start-title {
                font-size: 2.25rem;
                line-height: 1.1;
            }

            .start-subtitle {
                margin-bottom: 1rem;
            }

            .start-rules {
                max-height: 46dvh;
                overflow-y: auto;
                margin-bottom: 0.75rem;
            }

            .btn-ui {
                width: 100%;
                margin-top: 0.75rem;
            }
        }

        @media (max-width: 360px) {
            .top-status {
                font-size: 0.8rem;
            }

            .status-value {
                font-size: 1rem;
            }

            #clue-text {
                font-size: 0.95rem;
            }

            .btn-number {
                font-size: 0.75rem;
            }

            .btn-shape {
                font-size: 2rem;
            }
        }

        @media (max-height: 700px) {
            #game-container {
                justify-content: flex-start;
            }

            .terminal-box {
                min-height: 94px;
                padding-top: 0.65rem;
                padding-bottom: 0.65rem;
            }

            #clue-text {
                min-height: 3rem;
            }

            .start-rules {
                max-height: 40dvh;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>

    <div id="game-container">
        
        <!-- Header -->
        <div class="top-status flex justify-between items-end mb-2 crt-font">
            <div class="text-xl">SYS.LEVEL: <span id="level-display" class="status-value text-2xl font-bold">1</span></div>
            <div class="text-sm blink text-red-500 hidden" id="warning-text">CRITICAL OVR</div>
            <div class="text-xl">SCORE: <span id="score-display" class="status-value">0</span></div>
        </div>

        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>

        <!-- Terminal Clue Display -->
        <div class="terminal-box">
            <div class="text-xs mb-1 opacity-70 crt-font border-b border-green-800 pb-1">>> FATAL_CONDITION // READ FIRST</div>
            <div id="clue-text" class="text-lg font-bold tracking-wider leading-relaxed mt-2">
                <!-- Typewriter text goes here -->
            </div>
            <div class="terminal-hint text-xs mt-2 text-yellow-400 crt-font">** 避开禁止按键，清空所有安全键 **</div>
        </div>

        <!-- Button Grid -->
        <div id="btn-grid" class="btn-grid">
            <!-- Buttons generated by JS -->
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-screen" class="overlay">
            <h1 class="start-title text-5xl font-black mb-2 tracking-widest crt-font text-center" style="text-shadow: 0 0 20px var(--crt-green);">别按那个键</h1>
            <p class="start-subtitle text-xl mb-8 opacity-80 font-bold tracking-widest">CORE MELTDOWN</p>
            <div class="start-rules text-left max-w-sm text-sm leading-relaxed mb-8 opacity-90 p-4 border border-green-800 rounded bg-black bg-opacity-50">
                <p class="text-yellow-400 mb-2 font-bold">> 操作员指令：</p>
                <p class="mb-1">1. 每轮终端都会发布<span class="text-red-500 font-bold">【致命条件】</span>。</p>
                <p class="mb-1">2. 符合条件的按钮都是<span class="text-red-500 font-bold">禁止按键</span>，可能不止一个。</p>
                <p class="mb-1">3. 不符合条件的按钮才是<span class="text-green-400 font-bold">安全键</span>。</p>
                <p class="mb-1 text-green-400">4. 按下全部安全键，清空面板。</p>
                <p class="mt-2 text-xs opacity-70 text-center">读规则，避开致命键。系统会逐级加压。</p>
            </div>
            <button class="btn-ui" onclick="startGame()">开始清空面板</button>
        </div>

        <!-- Game Over Screen Overlay -->
        <div id="game-over-screen" class="overlay hidden">
            <h1 class="text-6xl font-black mb-4 text-red-500 crt-font blink">SYSTEM FAILURE</h1>
            <p class="text-2xl mb-2 text-white">核心已熔毁</p>
            <p class="text-lg mb-8 text-yellow-400">最终存活轮数: <span id="final-level" class="font-bold text-2xl">0</span></p>
            <p id="death-reason" class="text-sm opacity-80 mb-8 max-w-xs text-center leading-relaxed">
                已触发禁止按键。
            </p>
            <button class="btn-ui btn-ui-red" onclick="resetGame()">重新进入面板</button>
        </div>
    </div>

    <script>
        // Game Configurations & Data Vocabs
        const COLORS = [
            { id: 'red', css: 'color-red', name: '红色' },
            { id: 'blue', css: 'color-blue', name: '蓝色' },
            { id: 'yellow', css: 'color-yellow', name: '黄色' },
            { id: 'purple', css: 'color-purple', name: '紫色' }
        ];
        const SHAPES = [
            { id: 'triangle', char: '▲', name: '三角形' },
            { id: 'circle', char: '●', name: '圆形' },
            { id: 'square', char: '■', name: '正方形' },
            { id: 'star', char: '★', name: '五角星' }
        ];

        const DIFFICULTY_BANDS = [
            {
                id: 'training',
                label: 'TRAINING',
                minLevel: 1,
                maxLevel: 2,
                rows: 2,
                cols: 2,
                buttonCount: 4,
                fatalMin: 1,
                fatalMax: 1,
                ruleTiers: ['singleVisual'],
                readability: 'short visual clue',
                maxClueChars: 34,
                baseTimeLimitMs: 18000,
                minTimeLimitMs: 17000,
                timeDropPerLevelMs: 500,
                timeRewardMs: 2200,
                carryoverRatio: 0.45,
                feedbackIntensity: 'calm'
            },
            {
                id: 'orientation',
                label: 'ORIENTATION',
                minLevel: 3,
                maxLevel: 5,
                rows: 2,
                cols: 3,
                buttonCount: 6,
                fatalMin: 1,
                fatalMax: 1,
                ruleTiers: ['singleVisual', 'singleNumber'],
                readability: 'single-axis clue',
                maxClueChars: 38,
                baseTimeLimitMs: 17000,
                minTimeLimitMs: 15500,
                timeDropPerLevelMs: 500,
                timeRewardMs: 1800,
                carryoverRatio: 0.4,
                feedbackIntensity: 'low'
            },
            {
                id: 'baseline',
                label: 'BASELINE',
                minLevel: 6,
                maxLevel: 10,
                rows: 3,
                cols: 3,
                buttonCount: 9,
                fatalMin: 1,
                fatalMax: 2,
                ruleTiers: ['singleVisual', 'singleNumber', 'compoundAnd'],
                readability: 'simple mixed clue',
                maxClueChars: 44,
                baseTimeLimitMs: 15500,
                minTimeLimitMs: 13500,
                timeDropPerLevelMs: 400,
                timeRewardMs: 1300,
                carryoverRatio: 0.34,
                feedbackIntensity: 'medium'
            },
            {
                id: 'pressure',
                label: 'PRESSURE',
                minLevel: 11,
                maxLevel: 15,
                rows: 3,
                cols: 3,
                buttonCount: 9,
                fatalMin: 2,
                fatalMax: 3,
                ruleTiers: ['compoundAnd', 'compoundExact', 'not', 'orColor'],
                readability: 'compound clue',
                maxClueChars: 50,
                baseTimeLimitMs: 13500,
                minTimeLimitMs: 11500,
                timeDropPerLevelMs: 400,
                timeRewardMs: 900,
                carryoverRatio: 0.28,
                feedbackIntensity: 'high'
            },
            {
                id: 'extended',
                label: 'EXTENDED',
                minLevel: 16,
                rows: 3,
                cols: 3,
                buttonCount: 9,
                fatalMin: 2,
                fatalMax: 4,
                ruleTiers: ['compoundAnd', 'compoundExact', 'not', 'orColor', 'orMixed'],
                readability: 'full rule set',
                maxClueChars: 56,
                baseTimeLimitMs: 12000,
                minTimeLimitMs: 9500,
                timeDropPerLevelMs: 250,
                timeRewardMs: 700,
                carryoverRatio: 0.22,
                feedbackIntensity: 'critical'
            }
        ];

        function getDifficultyBand(level) {
            return DIFFICULTY_BANDS.find((band) =>
                level >= band.minLevel && (band.maxLevel === undefined || level <= band.maxLevel)
            ) || DIFFICULTY_BANDS[DIFFICULTY_BANDS.length - 1];
        }

        function getDifficultyForLevel(level) {
            const normalizedLevel = Math.max(1, Math.floor(Number(level) || 1));
            const band = getDifficultyBand(normalizedLevel);
            const levelOffset = normalizedLevel - band.minLevel;
            const timeLimitMs = Math.max(
                band.minTimeLimitMs,
                band.baseTimeLimitMs - (levelOffset * band.timeDropPerLevelMs)
            );
            return {
                ...band,
                level: normalizedLevel,
                timeLimitMs,
                gridSize: `${band.rows}x${band.cols}`
            };
        }

        const BEST_RECORD_KEY = 'thatbutton.bestRun.v1';
        const BEST_RECORD_VERSION = 1;
        const DEFAULT_BEST_RECORD = Object.freeze({
            version: BEST_RECORD_VERSION,
            bestLevel: 1,
            bestScore: 0,
            updatedAt: null
        });

        function cloneBestRecord(record = DEFAULT_BEST_RECORD) {
            return {
                version: BEST_RECORD_VERSION,
                bestLevel: Math.max(1, Math.floor(Number(record.bestLevel) || 1)),
                bestScore: Math.max(0, Math.floor(Number(record.bestScore) || 0)),
                updatedAt: typeof record.updatedAt === 'string' ? record.updatedAt : null
            };
        }

        function getBestRecordStorage() {
            try {
                return window.localStorage || null;
            } catch (error) {
                return null;
            }
        }

        function normalizeBestRecord(value) {
            if (!value || value.version !== BEST_RECORD_VERSION) {
                return null;
            }
            const bestLevel = Number(value.bestLevel);
            const bestScore = Number(value.bestScore);
            if (!Number.isFinite(bestLevel) || !Number.isFinite(bestScore)) {
                return null;
            }
            return cloneBestRecord({
                bestLevel,
                bestScore,
                updatedAt: value.updatedAt
            });
        }

        function loadBestRecord() {
            const storage = getBestRecordStorage();
            if (!storage) {
                return { record: cloneBestRecord(), status: 'unavailable' };
            }
            try {
                const raw = storage.getItem(BEST_RECORD_KEY);
                if (!raw) {
                    return { record: cloneBestRecord(), status: 'empty' };
                }
                const parsed = JSON.parse(raw);
                const normalized = normalizeBestRecord(parsed);
                if (!normalized) {
                    return { record: cloneBestRecord(), status: 'corrupt' };
                }
                return { record: normalized, status: 'loaded' };
            } catch (error) {
                return { record: cloneBestRecord(), status: 'corrupt' };
            }
        }

        function saveBestRecord(record) {
            const storage = getBestRecordStorage();
            const normalized = cloneBestRecord(record);
            if (!storage) {
                return { record: normalized, status: 'unavailable' };
            }
            try {
                storage.setItem(BEST_RECORD_KEY, JSON.stringify(normalized));
                return { record: normalized, status: 'saved' };
            } catch (error) {
                return { record: normalized, status: 'unavailable' };
            }
        }

        function compareRunToBest(runLevel, runScore, bestRecord) {
            const level = Math.max(1, Math.floor(Number(runLevel) || 1));
            const score = Math.max(0, Math.floor(Number(runScore) || 0));
            const best = cloneBestRecord(bestRecord);
            if (level > best.bestLevel || (level === best.bestLevel && score > best.bestScore)) {
                return 'new_best';
            }
            if (level === best.bestLevel && score === best.bestScore) {
                return 'matched_best';
            }
            return 'below_best';
        }

        function buildBestRecordFromRun(runLevel, runScore, timestamp = new Date().toISOString()) {
            return cloneBestRecord({
                bestLevel: runLevel,
                bestScore: runScore,
                updatedAt: timestamp
            });
        }

        // Game State Variables
        const loadedBestRecord = loadBestRecord();
        let gameState = {
            level: 1,
            score: 0,
            isPlaying: false,
            seed: null,
            rng: Math.random,
            debug: false,
            debugLog: [],
            currentDifficulty: getDifficultyForLevel(1),
            currentRuleTier: "",
            currentRuleId: "",
            buttons: [],       // Current board button data
            forbiddenIds: [],  // IDs of buttons that cause game over
            safeKeysRemaining: 0,
            timeLimit: 12000,  // ms
            timeLeft: 12000,
            lastTime: 0,
            animationFrame: null,
            currentRuleText: "",
            bestRecord: loadedBestRecord.record,
            bestRecordStatus: loadedBestRecord.status,
            lastRunComparison: null
        };

        // DOM Elements
        const gridEl = document.getElementById('btn-grid');
        const clueEl = document.getElementById('clue-text');
        const timerBarEl = document.getElementById('timer-bar');
        const levelDisplay = document.getElementById('level-display');
        const scoreDisplay = document.getElementById('score-display');
        const warningText = document.getElementById('warning-text');
        
        // Audio Synthesizer (No external assets)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSafeClick() { playBeep(600, 'sine', 0.1); }
        function playExplosion() {
            playBeep(100, 'sawtooth', 0.5);
            setTimeout(() => playBeep(50, 'square', 0.8), 100);
        }
        function playLevelUp() {
            playBeep(400, 'square', 0.1);
            setTimeout(() => playBeep(600, 'square', 0.15), 100);
            setTimeout(() => playBeep(800, 'square', 0.2), 250);
        }

        
        // Random utility
        function hashSeed(seedText) {
            let hash = 2166136261;
            for (let i = 0; i < seedText.length; i++) {
                hash ^= seedText.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }
            return hash >>> 0;
        }

        function createSeededRng(seedText) {
            let state = hashSeed(seedText);
            return function seededRandom() {
                state += 0x6D2B79F5;
                let t = state;
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function getSeedFromUrl() {
            const seed = new URLSearchParams(window.location.search).get('seed');
            return seed && seed.trim() ? seed.trim() : null;
        }

        function getDebugFromUrl() {
            const value = new URLSearchParams(window.location.search).get('debug');
            return value === '1' || value === 'true';
        }

        function resetRandomSource() {
            gameState.seed = getSeedFromUrl();
            gameState.rng = gameState.seed ? createSeededRng(gameState.seed) : Math.random;
        }

        const randomValue = () => gameState.rng();
        const randomInt = (min, max) => Math.floor(randomValue() * (max - min + 1)) + min;
        const randomItem = (arr) => arr[Math.floor(randomValue() * arr.length)];
        const SAFE_ACTION_TEXT = '匹配者是禁止按键；按其他安全键。';
        const formatFatalRule = (conditionText) => `致命条件：${conditionText}。${SAFE_ACTION_TEXT}`;

        function shuffledNumbers(count) {
            const pool = Array.from({ length: 9 }, (_, index) => index + 1);
            const numbers = [];
            while (numbers.length < count && pool.length > 0) {
                const index = randomInt(0, pool.length - 1);
                numbers.push(pool.splice(index, 1)[0]);
            }
            while (numbers.length < count) {
                numbers.push(randomInt(1, 9));
            }
            return numbers;
        }

        // Generate a valid rule based on difficulty level
        function generateRule(buttons, level, difficulty = getDifficultyForLevel(level)) {
            let ruleText = "";
            let targets = [];
            let attempts = 0;
            const maxAttempts = 100;

            // Define rule templates
            const templates = [
                { id: 'color', tier: 'singleVisual', fn: () => {
                    const c = randomItem(COLORS);
                    return { txt: formatFatalRule(`颜色为【${c.name}】`), check: (b) => b.color.id === c.id };
                }},
                { id: 'shape', tier: 'singleVisual', fn: () => {
                    const s = randomItem(SHAPES);
                    return { txt: formatFatalRule(`形状为【${s.name}】`), check: (b) => b.shape.id === s.id };
                }},
                { id: 'number-parity', tier: 'singleNumber', fn: () => {
                    const isEven = randomValue() > 0.5;
                    return { 
                        txt: formatFatalRule(`数字为【${isEven ? '偶数' : '奇数'}】`),
                        check: (b) => isEven ? (b.number % 2 === 0) : (b.number % 2 !== 0) 
                    };
                }},
                
                { id: 'color-shape-and', tier: 'compoundAnd', fn: () => {
                    const c = randomItem(COLORS);
                    const s = randomItem(SHAPES);
                    return { 
                        txt: formatFatalRule(`颜色为【${c.name}】且形状为【${s.name}】`),
                        check: (b) => b.color.id === c.id && b.shape.id === s.id 
                    };
                }},
                { id: 'color-number-exact', tier: 'compoundExact', fn: () => {
                    const sample = randomItem(buttons);
                    return { 
                        txt: formatFatalRule(`数字为【${sample.number}】且颜色为【${sample.color.name}】`),
                        check: (b) => b.color.id === sample.color.id && b.number === sample.number
                    };
                }},

                { id: 'not-color-shape', tier: 'not', fn: () => {
                    const c = randomItem(COLORS);
                    const s = randomItem(SHAPES);
                    return { 
                        txt: formatFatalRule(`颜色不是【${c.name}】且形状为【${s.name}】`),
                        check: (b) => b.color.id !== c.id && b.shape.id === s.id 
                    };
                }},
                { id: 'two-colors-or', tier: 'orColor', fn: () => {
                    const c1 = randomItem(COLORS);
                    let c2 = randomItem(COLORS);
                    while(c2.id === c1.id) c2 = randomItem(COLORS);
                    return { 
                        txt: formatFatalRule(`颜色为【${c1.name}】或【${c2.name}】`),
                        check: (b) => b.color.id === c1.id || b.color.id === c2.id 
                    };
                }},
                { id: 'color-or-parity', tier: 'orMixed', fn: () => {
                    const isEven = randomValue() > 0.5;
                    const c = randomItem(COLORS);
                    return { 
                        txt: formatFatalRule(`颜色为【${c.name}】或数字为【${isEven ? '偶数' : '奇数'}】`),
                        check: (b) => b.color.id === c.id || (isEven ? (b.number % 2 === 0) : (b.number % 2 !== 0))
                    };
                }}
            ];

            // Filter available templates for current level
            const availableTemplates = templates.filter(t => difficulty.ruleTiers.includes(t.tier));

            // Loop until we find a rule that fits the current difficulty band.
            while (attempts < maxAttempts) {
                const tmpl = randomItem(availableTemplates);
                const rule = tmpl.fn();
                targets = buttons.filter(b => rule.check(b));

                if (
                    targets.length >= difficulty.fatalMin &&
                    targets.length <= difficulty.fatalMax &&
                    rule.txt.length <= difficulty.maxClueChars
                ) {
                    return {
                        text: rule.txt,
                        targetIds: targets.map(t => t.id),
                        ruleTier: tmpl.tier,
                        ruleId: tmpl.id
                    };
                }
                attempts++;
            }
            
            // Fallback if loop fails (rare)
            const fallbackTarget = buttons[0];
            const fallbackTargets = buttons.filter(b =>
                b.color.id === fallbackTarget.color.id &&
                b.shape.id === fallbackTarget.shape.id &&
                b.number === fallbackTarget.number
            );
            return {
                text: formatFatalRule(`颜色为【${fallbackTarget.color.name}】且形状为【${fallbackTarget.shape.name}】且数字为【${fallbackTarget.number}】`),
                targetIds: fallbackTargets.map(t => t.id),
                ruleTier: 'fallback',
                ruleId: 'exact-button'
            };
        }

        function generateLevelData(difficulty = getDifficultyForLevel(gameState.level)) {
            gameState.currentDifficulty = difficulty;
            gameState.buttons = [];
            const numbers = shuffledNumbers(difficulty.buttonCount);
            for (let i = 0; i < difficulty.buttonCount; i++) {
                const num = numbers[i];

                gameState.buttons.push({
                    id: `btn-${i}`,
                    color: randomItem(COLORS),
                    shape: randomItem(SHAPES),
                    number: num,
                    isClicked: false
                });
            }

            // Generate Rule based on the board
            const ruleObj = generateRule(gameState.buttons, gameState.level, difficulty);
            gameState.currentRuleText = ruleObj.text;
            gameState.forbiddenIds = ruleObj.targetIds;
            gameState.currentRuleTier = ruleObj.ruleTier;
            gameState.currentRuleId = ruleObj.ruleId;
            gameState.safeKeysRemaining = difficulty.buttonCount - gameState.forbiddenIds.length;
        }

        function getButtonSummary(button) {
            if (!button) return null;
            return {
                id: button.id,
                color: button.color.id,
                shape: button.shape.id,
                number: button.number
            };
        }

        function getRoundSnapshot() {
            return {
                level: gameState.level,
                seed: gameState.seed,
                difficultyId: gameState.currentDifficulty.id,
                gridSize: gameState.currentDifficulty.gridSize,
                rows: gameState.currentDifficulty.rows,
                cols: gameState.currentDifficulty.cols,
                buttonCount: gameState.currentDifficulty.buttonCount,
                fatalCount: gameState.forbiddenIds.length,
                fatalRange: `${gameState.currentDifficulty.fatalMin}-${gameState.currentDifficulty.fatalMax}`,
                ruleText: gameState.currentRuleText,
                ruleTier: gameState.currentRuleTier,
                ruleId: gameState.currentRuleId,
                timeLimitMs: gameState.timeLimit,
                timeRewardMs: gameState.currentDifficulty.timeRewardMs,
                readability: gameState.currentDifficulty.readability,
                feedbackIntensity: gameState.currentDifficulty.feedbackIntensity,
                safeKeysRemaining: gameState.safeKeysRemaining
            };
        }

        function recordDebugEvent(type, details = {}) {
            const entry = {
                type,
                atMs: Math.round(performance.now()),
                ...getRoundSnapshot(),
                ...details
            };
            gameState.debugLog.push(entry);
            if (gameState.debug) {
                console.info('[ThatButton debug]', entry);
            }
            return entry;
        }

        function previewSeededLevel(seed, level = 1) {
            const targetLevel = Math.max(1, Math.floor(Number(level) || 1));
            const snapshot = {
                seed: gameState.seed,
                rng: gameState.rng,
                level: gameState.level,
                buttons: gameState.buttons,
                forbiddenIds: gameState.forbiddenIds,
                safeKeysRemaining: gameState.safeKeysRemaining,
                currentDifficulty: gameState.currentDifficulty,
                currentRuleTier: gameState.currentRuleTier,
                currentRuleId: gameState.currentRuleId,
                timeLimit: gameState.timeLimit,
                timeLeft: gameState.timeLeft,
                currentRuleText: gameState.currentRuleText
            };

            gameState.seed = seed;
            gameState.rng = createSeededRng(seed);
            let preview = null;

            for (let currentLevel = 1; currentLevel <= targetLevel; currentLevel++) {
                gameState.level = currentLevel;
                const difficulty = getDifficultyForLevel(currentLevel);
                gameState.timeLimit = difficulty.timeLimitMs;
                gameState.timeLeft = difficulty.timeLimitMs;
                generateLevelData(difficulty);
                preview = {
                    level: currentLevel,
                    seed,
                    difficultyId: difficulty.id,
                    gridSize: difficulty.gridSize,
                    rows: difficulty.rows,
                    cols: difficulty.cols,
                    buttonCount: difficulty.buttonCount,
                    fatalCount: gameState.forbiddenIds.length,
                    fatalRange: `${difficulty.fatalMin}-${difficulty.fatalMax}`,
                    ruleText: gameState.currentRuleText,
                    ruleTier: gameState.currentRuleTier,
                    ruleId: gameState.currentRuleId,
                    timeLimitMs: difficulty.timeLimitMs,
                    timeRewardMs: difficulty.timeRewardMs,
                    readability: difficulty.readability,
                    feedbackIntensity: difficulty.feedbackIntensity,
                    forbiddenIds: [...gameState.forbiddenIds],
                    buttons: gameState.buttons.map((button) => ({
                        color: button.color.id,
                        shape: button.shape.id,
                        number: button.number
                    }))
                };
            }

            Object.assign(gameState, snapshot);
            return preview;
        }

        window.__THAT_BUTTON_DEBUG__ = {
            previewSeededLevel,
            getDifficultyForLevel,
            getBestRecord: () => ({
                record: cloneBestRecord(gameState.bestRecord),
                status: gameState.bestRecordStatus,
                key: BEST_RECORD_KEY,
                version: BEST_RECORD_VERSION
            }),
            loadBestRecord: () => {
                const loaded = loadBestRecord();
                gameState.bestRecord = loaded.record;
                gameState.bestRecordStatus = loaded.status;
                return {
                    record: cloneBestRecord(gameState.bestRecord),
                    status: gameState.bestRecordStatus
                };
            },
            saveBestRecord: (level, score) => {
                const saved = saveBestRecord(buildBestRecordFromRun(level, score));
                gameState.bestRecord = saved.record;
                gameState.bestRecordStatus = saved.status;
                return {
                    record: cloneBestRecord(gameState.bestRecord),
                    status: gameState.bestRecordStatus
                };
            },
            resetBestRecord: () => {
                const storage = getBestRecordStorage();
                if (storage) {
                    storage.removeItem(BEST_RECORD_KEY);
                }
                gameState.bestRecord = cloneBestRecord();
                gameState.bestRecordStatus = storage ? 'empty' : 'unavailable';
                return {
                    record: cloneBestRecord(gameState.bestRecord),
                    status: gameState.bestRecordStatus
                };
            },
            compareRunToBest,
            getLog: () => [...gameState.debugLog],
            clearLog: () => {
                gameState.debugLog = [];
            }
        };


        let typewriterTimeout;
        function renderBoard() {
            gridEl.innerHTML = '';
            const difficulty = gameState.currentDifficulty;
            gridEl.style.gridTemplateColumns = `repeat(${difficulty.cols}, minmax(0, 1fr))`;
            gridEl.style.setProperty('--board-max-width', difficulty.cols <= 2 ? '340px' : '500px');
            gridEl.dataset.gridSize = difficulty.gridSize;
            
            gameState.buttons.forEach((btn, index) => {
                const btnEl = document.createElement('div');
                btnEl.id = btn.id;
                btnEl.className = `game-btn ${btn.color.css}`;
                btnEl.setAttribute('role', 'button');
                btnEl.setAttribute('tabindex', '0');
                btnEl.setAttribute('aria-label', `${btn.color.name}${btn.shape.name}，数字 ${btn.number}`);
                
                // Content: Number + Shape
                btnEl.innerHTML = `
                    <span class="btn-number crt-font">${String(btn.number).padStart(2, '0')}</span>
                    <span class="btn-shape">${btn.shape.char}</span>
                `;
                
                // Staggered entrance animation
                btnEl.style.opacity = '0';
                btnEl.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    btnEl.style.transition = 'all 0.2s cubic-bezier(.36,.07,.19,.97)';
                    btnEl.style.opacity = '1';
                    btnEl.style.transform = 'scale(1)';
                }, index * 40);

                // Add click listener
                btnEl.addEventListener('pointerdown', (e) => handleBtnClick(btn.id, btnEl, e), { passive: false });
                btnEl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        handleBtnClick(btn.id, btnEl, e);
                    }
                });
                
                gridEl.appendChild(btnEl);
            });

            // Typewriter effect for clue
            clueEl.innerHTML = '';
            clearTimeout(typewriterTimeout);
            let charIndex = 0;
            const text = gameState.currentRuleText;
            
            function typeChar() {
                if (charIndex < text.length) {
                    clueEl.innerHTML += text.charAt(charIndex);
                    charIndex++;
                    // Play tiny click sound for typewriter visually
                    if(charIndex % 3 === 0) playBeep(800 + Math.random()*200, 'square', 0.02);
                    typewriterTimeout = setTimeout(typeChar, 30);
                }
            }
            typeChar();

            // Update Header
            levelDisplay.innerText = gameState.level;
            scoreDisplay.innerText = gameState.score;
        }


        function handleBtnClick(id, element, event) {
            if (event) {
                if (event.pointerType && event.isPrimary === false) return;
                event.preventDefault();
            }
            if (!gameState.isPlaying) return;
            if (element.classList.contains('disabled') || element.classList.contains('pressed')) return;

            // Micro shake on every interaction
            document.body.classList.remove('shake-light');
            void document.body.offsetWidth; // trigger reflow
            document.body.classList.add('shake-light');

            element.classList.add('pressed');
            element.classList.add('disabled'); // Disable it

            if (gameState.forbiddenIds.includes(id)) {
                // Pressed the WRONG button!
                triggerGameOver(id, element);
            } else {
                // Pressed a SAFE button
                playSafeClick();
                gameState.safeKeysRemaining--;
                gameState.score += 10;
                
                const timeReward = gameState.currentDifficulty.timeRewardMs;
                gameState.timeLeft = Math.min(gameState.timeLimit, gameState.timeLeft + timeReward);

                if (gameState.safeKeysRemaining <= 0) {
                    levelComplete();
                }
            }
        }

        function triggerGameOver(id, element) {
            gameState.isPlaying = false;
            playExplosion();
            const isTimeout = id === 'timeout';
            const failedButton = gameState.buttons.find((button) => button.id === id);
            recordDebugEvent('failure', {
                failureReason: isTimeout ? 'timeout' : 'wrong_click',
                pressedButtonId: isTimeout ? null : id,
                pressedButton: getButtonSummary(failedButton)
            });
            
            // Visual feedback
            if (element) {
                element.classList.add('explode');
            }
            document.body.classList.add('shake-intense');
            
            // Highlight what was actually deadly
            setTimeout(() => {
                document.getElementById('final-level').innerText = gameState.level;
                
                const reasonEl = document.getElementById('death-reason');
                if (isTimeout) {
                    reasonEl.innerHTML = "倒计时归零。<br>面板未清空，反应堆越过临界线。";
                } else {
                    reasonEl.innerHTML = `你按下了禁止按键。<br><span class="text-xs text-green-400 mt-2 block">致命条件回放: ${gameState.currentRuleText}</span>`;
                }

                document.getElementById('game-over-screen').classList.remove('hidden');
            }, 800);
        }

        function levelComplete() {
            gameState.isPlaying = false;
            recordDebugEvent('level_complete');
            playLevelUp();
            gameState.level++;
            
            const nextDifficulty = getDifficultyForLevel(gameState.level);
            gameState.currentDifficulty = nextDifficulty;
            gameState.timeLimit = nextDifficulty.timeLimitMs;
            gameState.timeLeft = Math.min(
                gameState.timeLimit,
                gameState.timeLeft + (gameState.timeLimit * nextDifficulty.carryoverRatio)
            );

            if(nextDifficulty.feedbackIntensity === 'critical') {
                warningText.classList.remove('hidden');
            } else {
                warningText.classList.add('hidden');
            }

            setTimeout(() => {
                startRound();
            }, 600); // brief pause before next grid
        }

        function startRound() {
            const difficulty = getDifficultyForLevel(gameState.level);
            gameState.currentDifficulty = difficulty;
            if (!gameState.timeLimit) {
                gameState.timeLimit = difficulty.timeLimitMs;
                gameState.timeLeft = difficulty.timeLimitMs;
            }
            generateLevelData(difficulty);
            recordDebugEvent('round_start');
            renderBoard();
            gameState.lastTime = performance.now();
            gameState.isPlaying = true;
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.body.classList.remove('shake-intense');
            resetRandomSource();
            gameState.debug = getDebugFromUrl();
            gameState.debugLog = [];
            
            // Reset Stats
            gameState.level = 1;
            gameState.score = 0;
            gameState.currentDifficulty = getDifficultyForLevel(1);
            gameState.timeLimit = gameState.currentDifficulty.timeLimitMs;
            gameState.timeLeft = gameState.currentDifficulty.timeLimitMs;
            warningText.classList.add('hidden');
            
            startRound();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            startGame();
        }


        function gameLoop(timestamp) {
            if (!gameState.isPlaying) {
                gameState.lastTime = timestamp;
                requestAnimationFrame(gameLoop);
                return;
            }

            const deltaTime = timestamp - gameState.lastTime;
            gameState.lastTime = timestamp;
            
            gameState.timeLeft -= deltaTime;

            // Update Timer UI
            const timePercent = Math.max(0, (gameState.timeLeft / gameState.timeLimit) * 100);
            timerBarEl.style.width = `${timePercent}%`;

            if (timePercent < 30) {
                timerBarEl.classList.add('timer-danger');
                if(Math.floor(gameState.timeLeft / 200) % 2 === 0) {
                     timerBarEl.style.opacity = '0.5';
                } else {
                     timerBarEl.style.opacity = '1';
                }
            } else {
                timerBarEl.classList.remove('timer-danger');
                timerBarEl.style.opacity = '1';
            }

            // Check Time Out
            if (gameState.timeLeft <= 0) {
                triggerGameOver('timeout', null);
            }

            scoreDisplay.innerText = gameState.score;

            requestAnimationFrame(gameLoop);
        }

    </script>
